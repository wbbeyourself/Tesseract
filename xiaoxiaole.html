<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 连连消 ✨</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  overflow: hidden;
}

.bg-particle {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.15;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 0.15; }
  90% { opacity: 0.15; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

.game-wrapper {
  background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
  backdrop-filter: blur(20px);
  border-radius: 32px;
  padding: 30px 35px 35px;
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding: 0 4px;
}

.title {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(90deg, #f9d423, #ff4e50);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
}

.stats {
  display: flex;
  gap: 16px;
}

.stat-item { text-align: center; }

.stat-label {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.stat-value {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  line-height: 1.3;
}

.stat-value.score {
  background: linear-gradient(90deg, #f9d423, #f7971e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.stat-value.time {
  font-variant-numeric: tabular-nums;
}
.stat-value.time.warning { color: #ff6b6b; }

.board-container {
  position: relative;
  border-radius: 18px;
  background: rgba(0,0,0,0.3);
  padding: 10px;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
}

canvas#board {
  display: block;
  width: 480px;
  height: 480px;
  border-radius: 12px;
  cursor: pointer;
  touch-action: none;
}

.overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: rgba(0,0,0,0.6);
  border-radius: 12px;
  backdrop-filter: blur(4px);
  z-index: 10;
}
.overlay.show { display: flex; }
.overlay h1 {
  font-size: 48px;
  color: #fff;
  text-shadow: 0 4px 20px rgba(0,0,0,0.5);
  margin-bottom: 10px;
}
.overlay p {
  color: rgba(255,255,255,0.7);
  font-size: 16px;
  margin-bottom: 20px;
}
.overlay .btn {
  background: linear-gradient(135deg, #f9d423, #ff4e50);
  border: none;
  color: #fff;
  padding: 12px 36px;
  border-radius: 14px;
  cursor: pointer;
  font-size: 18px;
  font-weight: 600;
  font-family: inherit;
  transition: all 0.2s;
}
.overlay .btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(255,78,80,0.4);
}

.combo-popup {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 42px;
  font-weight: 800;
  pointer-events: none;
  text-shadow: 0 4px 20px rgba(0,0,0,0.6);
  opacity: 0;
  transition: none;
  white-space: nowrap;
}
.combo-popup.show {
  animation: comboAnim 0.9s ease-out forwards;
}
@keyframes comboAnim {
  0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
  20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  40% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
}

.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 16px;
  padding: 0 4px;
}

.progress-bar {
  flex: 1;
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
  margin: 0 16px;
}
.progress-fill {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, #4ECDC4, #FFE66D);
  border-radius: 4px;
  transition: width 0.3s ease;
}

.remain-label {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  min-width: 60px;
  text-align: right;
}

.restart-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.7);
  padding: 8px 20px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
  font-family: inherit;
}
.restart-btn:hover {
  background: rgba(255,255,255,0.15);
  color: #fff;
  transform: translateY(-1px);
}

@media (max-width: 550px) {
  .game-wrapper { padding: 16px; border-radius: 20px; }
  canvas#board { width: calc(100vw - 70px); height: calc(100vw - 70px); }
  .title { font-size: 20px; }
  .stat-value { font-size: 18px; }
  .game-wrapper { max-width: 95vw; }
  .progress-bar { margin: 0 8px; }
}
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="header">
    <div class="title">✨ 连连消 ✨</div>
    <div class="stats">
      <div class="stat-item">
        <div class="stat-label">分数</div>
        <div class="stat-value score" id="scoreDisplay">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">时间</div>
        <div class="stat-value time" id="timeDisplay">03:00</div>
      </div>
    </div>
  </div>

  <div class="board-container">
    <canvas id="board"></canvas>
    <div class="combo-popup" id="comboPopup"></div>
    <div class="overlay" id="overlay">
      <h1 id="overlayTitle">🎉 胜利!</h1>
      <p id="overlayDesc">得分：0</p>
      <button class="btn" id="overlayBtn">再来一局</button>
    </div>
  </div>

  <div class="footer">
    <button class="restart-btn" id="restartBtn">🔄 重新开始</button>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="remain-label" id="remainLabel">剩余 64</div>
  </div>
</div>

<script>
// ========== 连连消 — 连连看式消消乐 ==========

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const timeDisplay = document.getElementById('timeDisplay');
const comboPopup = document.getElementById('comboPopup');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayDesc = document.getElementById('overlayDesc');
const overlayBtn = document.getElementById('overlayBtn');
const progressFill = document.getElementById('progressFill');
const remainLabel = document.getElementById('remainLabel');

const COLS = 8;
const ROWS = 8;
const TYPES = 6;
const CELL_SIZE = 60;
const GAME_DURATION = 180;

canvas.width = COLS * CELL_SIZE;
canvas.height = ROWS * CELL_SIZE;

const GEM_COLORS = [
  ['#FF6B6B', '#EE5A5A'],
  ['#4ECDC4', '#3BBDB5'],
  ['#FFE66D', '#FFD93D'],
  ['#A8E6CF', '#7ECBA1'],
  ['#DDA0DD', '#C77DC7'],
  ['#FF9FF3', '#FF7AE8'],
];
const GEM_EMOJI = ['❤️', '💎', '⭐', '🍀', '🔮', '🌸'];

// --- 状态 ---
let board = [];
let score = 0;
let timeLeft = GAME_DURATION;
let timerInterval = null;
let isProcessing = false;
let gameEnded = false;

// 选中状态（连接消除模式）
let selectedGems = [];     // [{row, col}, ...] 按点击顺序
let selectedType = -1;

// 消除动画
let clearingCells = new Map();
const CLEAR_ANIM_DURATION = 350;

// ========== 音效系统 ==========
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type = 'sine', volume = 0.15) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playNotes(notes, baseDelay = 0.07) {
  ensureAudio();
  notes.forEach(([freq, delay, type = 'sine', vol = 0.12]) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    const t = audioCtx.currentTime + delay;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.15);
  });
}

const SoundFX = {
  select() { playTone(660, 0.08, 'sine', 0.08); },
  connect() { playTone(880, 0.1, 'sine', 0.1); },
  clear(count) {
    if (count >= 5) {
      playNotes([[523,0],[659,0.06],[784,0.12],[1047,0.18]], 0.06);
    } else {
      playTone(784, 0.12, 'sine', 0.12);
      setTimeout(() => playTone(988, 0.12, 'sine', 0.1), 60);
    }
  },
  win() {
    playNotes([
      [523,0],[659,0.1],[784,0.2],[1047,0.3,'triangle',0.12],
      [1319,0.4,'triangle',0.1],
    ]);
  },
  lose() {
    playNotes([
      [784,0,'sine',0.1],[659,0.2,'sine',0.1],
      [523,0.4,'sine',0.1],[440,0.6,'triangle',0.08],
    ]);
  },
  invalid() { playTone(200, 0.15, 'sawtooth', 0.06); },
  shuffle() {
    for (let i = 0; i < 8; i++) {
      setTimeout(() => playTone(300 + Math.random() * 400, 0.06, 'sine', 0.05), i * 40);
    }
  },
  tick() { playTone(800, 0.03, 'sine', 0.03); },
};

function rand(max) { return Math.floor(Math.random() * max); }

// --- 初始化棋盘 ---
function createBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) {
      let type;
      do {
        type = rand(TYPES);
      } while (
        (r >= 2 && board[r-1][c] === type && board[r-2][c] === type) ||
        (c >= 2 && board[r][c-1] === type && board[r][c-2] === type)
      );
      board[r][c] = type;
    }
  }
}

// --- 统计剩余宝石数 ---
function countRemaining() {
  let n = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c] !== -1) n++;
  return n;
}

function updateRemainUI() {
  const remain = countRemaining();
  const total = ROWS * COLS;
  const pct = (remain / total) * 100;
  progressFill.style.width = pct + '%';
  remainLabel.textContent = `剩余 ${remain}`;
}

// --- 棋盘外也视为空位（经典连连看规则）---
function isCellEmpty(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return true;
  return board[r][c] === -1;
}

// 检查两点间直线是否畅通（不含端点）
function isLineClear(r1, c1, r2, c2) {
  if (r1 === r2) {
    const minC = Math.min(c1, c2), maxC = Math.max(c1, c2);
    for (let c = minC + 1; c < maxC; c++)
      if (!isCellEmpty(r1, c)) return false;
    return true;
  }
  if (c1 === c2) {
    const minR = Math.min(r1, r2), maxR = Math.max(r1, r2);
    for (let r = minR + 1; r < maxR; r++)
      if (!isCellEmpty(r, c1)) return false;
    return true;
  }
  return false;
}

// 两点能否通过空位相连（直连 / 1 个拐角 / 2 个拐角，支持棋盘外）
function canConnect(r1, c1, r2, c2) {
  if (r1 === r2 && c1 === c2) return false;

  // 0 拐角：直线
  if (isLineClear(r1, c1, r2, c2)) return true;

  // 1 拐角：L 形（拐角可以出棋盘）
  if (isCellEmpty(r1, c2) && isLineClear(r1, c1, r1, c2) && isLineClear(r1, c2, r2, c2)) return true;
  if (isCellEmpty(r2, c1) && isLineClear(r1, c1, r2, c1) && isLineClear(r2, c1, r2, c2)) return true;

  // 2 拐角：扫描行 + 棋盘外行（-1 和 ROWS）
  for (let r = -1; r <= ROWS; r++) {
    if (!isCellEmpty(r, c1) || !isCellEmpty(r, c2)) continue;
    if (isLineClear(r1, c1, r, c1) && isLineClear(r, c1, r, c2) && isLineClear(r, c2, r2, c2))
      return true;
  }
  // 2 拐角：扫描列 + 棋盘外列（-1 和 COLS）
  for (let c = -1; c <= COLS; c++) {
    if (!isCellEmpty(r1, c) || !isCellEmpty(r2, c)) continue;
    if (isLineClear(r1, c1, r1, c) && isLineClear(r1, c, r2, c) && isLineClear(r2, c, r2, c2))
      return true;
  }

  return false;
}

// ========== 计时器 ==========
function startTimer() {
  stopTimer();
  timerInterval = setInterval(() => {
    if (gameEnded) return;
    timeLeft--;
    updateUI();
    if (timeLeft <= 10 && timeLeft > 0) SoundFX.tick();
    if (timeLeft <= 0) {
      timeLeft = 0;
      updateUI();
      gameEnded = true;
      stopTimer();
      isProcessing = false;
      gameLose();
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ========== 核心玩法：点击连接消除 ==========

function handleCellClick(row, col) {
  if (isProcessing) return;
  if (gameEnded) return;
  if (timeLeft <= 0) return;

  const type = board[row][col];
  if (type === -1) {
    // 点空位 → 取消选中
    clearSelection();
    return;
  }

  // 点击了已选中的宝石 → 取消选中
  if (selectedGems.some(g => g.row === row && g.col === col)) {
    clearSelection();
    return;
  }

  // 第一次选择
  if (selectedGems.length === 0) {
    selectedGems.push({row, col});
    selectedType = type;
    SoundFX.select();
    return;
  }

  // 后续选择：必须同类型，且与上一个有畅通路径
  if (type === selectedType) {
    const last = selectedGems[selectedGems.length - 1];
    if (canConnect(last.row, last.col, row, col)) {
      selectedGems.push({row, col});
      SoundFX.connect();

      // 够 3 个 → 消除
      if (selectedGems.length >= 3) {
        clearSelectedGroup();
      }
      return;
    }
  }

  // 不同类或无法连通 → 重新开始选
  clearSelection();
  // 但直接点新 gem 可以立即选中它
  selectedGems.push({row, col});
  selectedType = type;
  SoundFX.select();
}

function clearSelection() {
  selectedGems = [];
  selectedType = -1;
}

function clearSelectedGroup() {
  isProcessing = true;

  // 直接消除被选中的宝石（玩家手动挑选的）
  const toClear = selectedGems.slice();

  const pts = toClear.length * 10;
  score += pts;
  updateUI();
  SoundFX.clear(toClear.length);

  // 消除动画
  const now = Date.now();
  for (const {row, col} of toClear) {
    const t = board[row][col];
    if (t !== -1) {
      clearingCells.set(row + ',' + col, { startTime: now, type: t });
    }
  }

  clearSelection();

  setTimeout(() => {
    // 实际移除
    for (const {row, col} of toClear) {
      board[row][col] = -1;
    }
    clearingCells.clear();
    updateRemainUI();

    // 检查胜利
    if (countRemaining() === 0) {
      gameEnded = true;
      stopTimer();
      gameWin();
      return;
    }

    // 检查是否无路可走（没有 ≥3 个的同种元素）
    if (!hasAnyPlayableGroup()) {
      showCombo('🔀 洗牌');
      SoundFX.shuffle();
      setTimeout(() => {
        if (shuffleRemaining()) {
          isProcessing = false;
        } else {
          // 洗了也救不活 → 真的结束了
          gameEnded = true;
          stopTimer();
          gameLose();
        }
      }, 500);
      return;
    }
    isProcessing = false;
  }, CLEAR_ANIM_DURATION);
}

// 检查棋盘上是否存在 ≥3 个的同种元素（不要求相连，可通过路径连接）
function hasAnyPlayableGroup() {
  const counts = Array(TYPES).fill(0);
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c] !== -1) counts[board[r][c]]++;
  return counts.some(c => c >= 3);
}

// ========== Combo 弹窗 ==========
function showCombo(text) {
  comboPopup.textContent = text;
  comboPopup.className = 'combo-popup';
  void comboPopup.offsetWidth;
  comboPopup.className = 'combo-popup show';
}

// ========== 死局洗牌 ==========
function shuffleRemaining() {
  // 收集剩余宝石的位置和类型
  const cells = [], types = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c] !== -1) {
        cells.push({row: r, col: c});
        types.push(board[r][c]);
      }
    }
  }
  if (types.length < 3) return false; // 太少了，洗不活

  // 费雪-耶茨打乱
  for (let i = types.length - 1; i > 0; i--) {
    const j = rand(i + 1);
    [types[i], types[j]] = [types[j], types[i]];
  }

  for (let i = 0; i < cells.length; i++) {
    board[cells[i].row][cells[i].col] = types[i];
  }

  return hasAnyPlayableGroup();
}

// ========== 胜利 / 失败 ==========
function showOverlay(title, desc, btnText) {
  overlayTitle.textContent = title;
  overlayDesc.textContent = desc;
  overlayBtn.textContent = btnText;
  overlay.classList.add('show');
}

function gameWin() {
  SoundFX.win();
  showOverlay('🎉 恭喜通关!', `你用了 ${GAME_DURATION - timeLeft} 秒，得分 ${score}`, '再来一局');
}

function gameLose() {
  SoundFX.lose();
  const remain = countRemaining();
  if (remain > 0 && timeLeft <= 0) {
    showOverlay('⏰ 时间到!', `还剩 ${remain} 个宝石，得分 ${score}`, '再试一次');
  } else {
    showOverlay('😅 卡住了!', `还剩 ${remain} 个宝石无法消除，得分 ${score}`, '重新开始');
  }
}

// ========== 渲染 ==========
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const now = Date.now();

  // 网格
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * CELL_SIZE, y = r * CELL_SIZE;
      ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(255,255,255,0.04)' : 'rgba(255,255,255,0.08)';
      ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
    }
  }

  // 选中高亮（按顺序连线）
  if (selectedGems.length > 0) {
    for (let i = 0; i < selectedGems.length; i++) {
      const {row, col} = selectedGems[i];
      const x = col * CELL_SIZE, y = row * CELL_SIZE;
      const pulse = Math.sin(now * 0.006 + i * 0.5) * 0.3 + 0.5;
      ctx.strokeStyle = `rgba(255,255,255,${pulse * 0.7})`;
      ctx.lineWidth = 3;
      ctx.shadowColor = 'rgba(255,255,255,0.3)';
      ctx.shadowBlur = 15;
      ctx.strokeRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4);
      ctx.shadowBlur = 0;

      // 序号
      if (selectedGems.length < 6) {
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(i + 1, x + CELL_SIZE / 2, y + 4);
      }
    }

    // 连 3 个以上时的提示
    if (selectedGems.length >= 3) {
      const pulse = Math.sin(now * 0.008) * 0.3 + 0.7;
      ctx.fillStyle = `rgba(255,215,0,${pulse})`;
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      const last = selectedGems[selectedGems.length - 1];
      ctx.fillText('✨消除', last.col * CELL_SIZE + CELL_SIZE / 2, last.row * CELL_SIZE - 4);
    }
  }

  // 画宝石
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const type = board[r][c];
      if (type === -1) continue;

      const key = r + ',' + c;
      const x = c * CELL_SIZE, y = r * CELL_SIZE;
      const cx = x + CELL_SIZE/2, cy = y + CELL_SIZE/2;

      const clearing = clearingCells.get(key);
      let scale = 1, alpha = 1;
      if (clearing) {
        const elapsed = now - clearing.startTime;
        const progress = Math.min(elapsed / CLEAR_ANIM_DURATION, 1);
        const eased = 1 - (1 - progress) * (1 - progress);
        scale = 1 - eased * 0.8;
        alpha = 1 - eased;
        if (alpha <= 0) continue;
      }

      const sz = 22 * scale;
      ctx.save();
      ctx.globalAlpha = alpha;

      const grad = ctx.createRadialGradient(cx-4*scale, cy-4*scale, 2*scale, cx, cy, sz);
      grad.addColorStop(0, GEM_COLORS[type][0]);
      grad.addColorStop(1, GEM_COLORS[type][1]);
      ctx.shadowColor = GEM_COLORS[type][0];
      ctx.shadowBlur = 10 * scale;
      ctx.beginPath();
      ctx.arc(cx, cy, sz, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.beginPath();
      ctx.arc(cx-6*scale, cy-6*scale, 7*scale, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = `${20 * scale}px "Segoe UI", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(GEM_EMOJI[type], cx, cy + 1);

      ctx.restore();
    }
  }

  requestAnimationFrame(render);
}

// ========== UI ==========
function updateUI() {
  scoreDisplay.textContent = score;
  const mins = Math.floor(timeLeft / 60), secs = timeLeft % 60;
  timeDisplay.textContent = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
  timeDisplay.classList.toggle('warning', timeLeft <= 30);
  updateRemainUI();
}

// ========== 输入 ==========
function getGridPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
  let clientX, clientY;
  if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; e.preventDefault(); }
  else { clientX = e.clientX; clientY = e.clientY; }
  const col = Math.floor((clientX - rect.left) * scaleX / CELL_SIZE);
  const row = Math.floor((clientY - rect.top) * scaleY / CELL_SIZE);
  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return null;
  return { row, col };
}

canvas.addEventListener('click', e => {
  const pos = getGridPos(e);
  if (pos) handleCellClick(pos.row, pos.col);
});
canvas.addEventListener('touchstart', e => {
  const pos = getGridPos(e);
  if (pos) handleCellClick(pos.row, pos.col);
}, { passive: false });

// ========== 初始化 ==========
function initGame() {
  score = 0;
  timeLeft = GAME_DURATION;
  gameEnded = false;
  isProcessing = false;
  clearingCells.clear();
  clearSelection();
  overlay.classList.remove('show');
  createBoard();
  updateUI();
  startTimer();
}

// 背景粒子
function createBgParticles() {
  for (let i = 0; i < 25; i++) {
    const el = document.createElement('div');
    el.className = 'bg-particle';
    const size = rand(20) + 6;
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.left = rand(100) + '%';
    el.style.background = ['#FF6B6B','#4ECDC4','#FFE66D','#DDA0DD','#FF9FF3','#A8E6CF'][rand(6)];
    el.style.animationDuration = (rand(15) + 12) + 's';
    el.style.animationDelay = (rand(20)) + 's';
    document.body.appendChild(el);
  }
}

// --- 启动 ---
createBgParticles();
initGame();
render();

document.getElementById('restartBtn').addEventListener('click', () => {
  stopTimer();
  if (confirm('确定要重新开始吗？')) initGame();
  else startTimer();
});

overlayBtn.addEventListener('click', initGame);

</script>
