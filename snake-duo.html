<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🐍 双人贪吃蛇</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh;
            background: linear-gradient(135deg, #fef9f0 0%, #fde8d0 50%, #fdf0d5 100%);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, monospace;
            padding: 16px;
        }
        .game-wrapper { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
        .game-container {
            background: rgba(255,248,240,0.85); border-radius: 28px; padding: 16px 20px;
            backdrop-filter: blur(4px); box-shadow: 0 20px 35px rgba(200,150,100,0.25);
        }
        h1 {
            text-align: center; margin: 0 0 10px 0; font-size: 2rem;
            background: linear-gradient(135deg, #ff8c00, #ffd93d);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            text-shadow: 0 0 8px rgba(255,140,0,0.3);
            animation: breatheGlow 3s ease-in-out infinite; letter-spacing: 2px;
        }
        @keyframes breatheGlow {
            0% { text-shadow: 0 0 2px #ffb347; opacity: 1; }
            50% { text-shadow: 0 0 20px #ffd93d, 0 0 5px #ff8c00; }
            100% { text-shadow: 0 0 2px #ffb347; }
        }
        .top-stats {
            display: flex; gap: 12px; justify-content: space-between; margin-bottom: 12px;
        }
        .player-panel {
            flex: 1; background: #fff8ee; border-radius: 16px; padding: 8px 14px;
            border: 2px solid transparent; text-align: center;
        }
        .player-panel.p1 { border-color: #44cc66; }
        .player-panel.p2 { border-color: #4d96ff; }
        .player-panel .pname { font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; }
        .player-panel .pname.p1c { color: #33aa55; }
        .player-panel .pname.p2c { color: #3388dd; }
        .pp-stats { display: flex; gap: 10px; justify-content: center; margin-top: 2px; }
        .pp-stat { font-size: 1.1rem; }
        .pp-stat .v { font-weight: 800; font-size: 1.5rem; }
        .pp-stat .v.g { background: linear-gradient(135deg,#ff8c00,#ffd93d); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .pp-stat .v.b { color: #4d96ff; }
        .pp-stat .label { font-size: 0.7rem; color: #8B7355; }
        .timer-center { font-size: 1.3rem; font-weight: 800; color: #ff8c00; display: flex; align-items: center; justify-content: center; min-width: 70px; }

        canvas {
            display: block; margin: 0 auto; border-radius: 16px;
            box-shadow: 0 0 25px rgba(255,180,80,0.2), 0 4px 10px rgba(200,150,100,0.3);
            border: 2px solid #f0d5a0; cursor: pointer;
            transition: box-shadow 0.3s ease;
        }
        canvas:hover { box-shadow: 0 0 35px rgba(255,180,80,0.35), 0 4px 15px rgba(200,150,100,0.3); }
        .control-hint {
            text-align: center; margin-top: 10px; font-size: 0.85rem; color: #8B7355;
        }
        kbd {
            background: #fff0d0; border-radius: 6px; padding: 3px 8px;
            border: 1px solid #d4b88a; font-weight: bold; color: #5a4a2a;
            margin: 0 2px; box-shadow: inset 0 1px 0 #fff8e0, 0 1px 2px rgba(150,100,50,0.15);
            font-size: 0.85rem;
        }
        .side-panel {
            width: 220px; display: flex; flex-direction: column; gap: 10px;
        }
        .panel {
            background: rgba(255,248,240,0.9); backdrop-filter: blur(8px); border-radius: 18px;
            padding: 14px; border: 1px solid #f0d5a0;
            box-shadow: 0 8px 20px rgba(200,150,100,0.15);
        }
        .panel.p1-panel { border-left: 4px solid #44cc66; }
        .panel.p2-panel { border-left: 4px solid #4d96ff; }
        .panel h3 { font-size: 0.95rem; margin: 0 0 8px 0; color: #5a4a2a; }
        .stat-card {
            background: #fffdf5; border-radius: 14px; padding: 10px; margin-bottom: 8px;
            text-align: center; color: #5a4a2a; font-size: 0.85rem;
        }
        .stat-card .value { font-size: 1.3rem; font-weight: bold; }
        .stat-card .value.g { background: linear-gradient(135deg,#ff8c00,#ffd93d); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stat-card .value.b { color: #4d96ff; }
        .combo-bar { background: #f0e0c0; border-radius: 20px; height: 8px; overflow: hidden; margin: 6px 0; }
        .combo-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77); transition: width 0.2s; }
        .buff-tag {
            display: inline-block; background: #fff5e0; border-radius: 30px; padding: 2px 8px;
            margin: 2px; color: #8B6914; font-weight: 500; font-size: 0.75rem;
            border: 1px solid #f5d8a0;
        }
        .legend-items { font-size: 0.78rem; display: flex; flex-wrap: wrap; gap: 4px; }
        .legend-items span { background: #fff8ee; border-radius: 12px; padding: 2px 8px; border: 1px solid #f0d5a0; }
        .revive-dot { display: inline-block; width: 16px; height: 16px; border-radius: 50%; margin: 0 2px; }
        .revive-dot.p1c { background: #44cc66; }
        .revive-dot.p2c { background: #4d96ff; }
        .revive-dot.used { background: #ddd; }

        @media (max-width: 1100px) {
            .side-panel { width: 180px; }
            .game-wrapper { gap: 10px; }
        }
        @media (max-width: 800px) {
            .side-panel { width: 100%; order: 3; }
            .game-container { order: 2; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- Left side: P1 -->
    <div class="side-panel">
        <div class="panel p1-panel">
            <h3>🟢 P1 <span style="font-weight:400;font-size:0.8rem;color:#8B7355;">WASD</span></h3>
            <div class="stat-card">🔥 连击 <span class="value g" id="p1Combo">x1.0</span><div class="combo-bar"><div class="combo-fill" id="p1ComboFill"></div></div></div>
            <div class="stat-card">🛡️ 效果 <span id="p1Buffs" style="font-size:0.75rem;color:#8B7355;">无</span></div>
            <div class="stat-card">💚 复活 <span id="p1Revives"></span></div>
        </div>
    </div>

    <!-- Center: Game -->
    <div class="game-container">
        <h1>🐍 双人贪吃蛇</h1>
        <div class="top-stats">
            <div class="player-panel p1">
                <div class="pname p1c">🟢 P1</div>
                <div class="pp-stats">
                    <div class="pp-stat"><div class="v g" id="p1Score">0</div><div class="label">得分</div></div>
                    <div class="pp-stat"><div class="v g" id="p1Level">1</div><div class="label">等级</div></div>
                    <div class="pp-stat"><div class="v g" id="p1Length">3</div><div class="label">长度</div></div>
                </div>
            </div>
            <div class="timer-center" id="timerDisplay">1:30</div>
            <div class="player-panel p2">
                <div class="pname p2c">🔵 P2</div>
                <div class="pp-stats">
                    <div class="pp-stat"><div class="v b" id="p2Score">0</div><div class="label">得分</div></div>
                    <div class="pp-stat"><div class="v b" id="p2Level">1</div><div class="label">等级</div></div>
                    <div class="pp-stat"><div class="v b" id="p2Length">3</div><div class="label">长度</div></div>
                </div>
            </div>
        </div>
        <canvas id="gameCanvas" width="720" height="720"></canvas>
        <div class="control-hint">
            <span style="color:#33aa55;font-weight:bold;">P1: <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd></span>
            &nbsp;&nbsp;|&nbsp;&nbsp;
            <span style="color:#3388dd;font-weight:bold;">P2: <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd></span>
            &nbsp;&nbsp;|&nbsp;
            <kbd>空格</kbd> 开始/暂停 &nbsp;|&nbsp; 双击方向 冲刺
        </div>
    </div>

    <!-- Right side: P2 -->
    <div class="side-panel">
        <div class="panel p2-panel">
            <h3>🔵 P2 <span style="font-weight:400;font-size:0.8rem;color:#8B7355;">方向键</span></h3>
            <div class="stat-card">🔥 连击 <span class="value b" id="p2Combo">x1.0</span><div class="combo-bar"><div class="combo-fill" id="p2ComboFill"></div></div></div>
            <div class="stat-card">🛡️ 效果 <span id="p2Buffs" style="font-size:0.75rem;color:#8B7355;">无</span></div>
            <div class="stat-card">💚 复活 <span id="p2Revives"></span></div>
        </div>
        <div class="panel">
            <h3>📦 道具</h3>
            <div class="legend-items">
                <span>🍎 +10</span><span>⭐ ×2</span><span>🐢 减速</span>
                <span>⚡ 加速</span><span>👻 幽灵</span><span>🛡️ 护盾</span>
                <span>💣 清屏</span><span>🪨 缩小</span>
            </div>
        </div>
    </div>
</div>

<script>
(function(){
    const CELL = 20, GRID = 36;
    const SPEED_BASE = 130, SPEED_MIN = 55;
    const LEVEL_SCORE = 50;
    const GAME_DURATION = 90000;
    const MAX_ITEMS = 25;
    const COMBO_TIMEOUT = 3000;
    const REVIVE_DELAY = 2000;
    const DASH_WINDOW = 250, DASH_DURATION = 200, DASH_FACTOR = 0.4;
    const STORM_INTERVAL = 25000, STORM_DURATION = 3000, STORM_SPAWN_INTERVAL = 200, STORM_TOTAL_ITEMS = 18;

    const ITEM_TYPES = [
        {type:'FOOD', chance:0.65, shape:'circle', color:'#ff4757', points:10, effect:null, duration:0},
        {type:'DOUBLES', chance:0.10, shape:'star', color:'#ffd93d', points:20, effect:'double', duration:5000},
        {type:'SLOW', chance:0.08, shape:'diamond', color:'#6bcb77', points:15, effect:'slow', duration:6000},
        {type:'FAST', chance:0.07, shape:'triangle', color:'#4d96ff', points:15, effect:'speed', duration:5000},
        {type:'GHOST', chance:0.05, shape:'hexagon', color:'#ff6b9d', points:15, effect:'ghost', duration:5000},
        {type:'SHIELD', chance:0.03, shape:'shield', color:'#c084fc', points:20, effect:'shield', duration:8000},
        {type:'BOMB', chance:0.02, shape:'bomb', color:'#ff8c00', points:25, effect:'bomb', duration:3000},
    ];

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    // P1 DOM
    const p1Score = document.getElementById('p1Score');
    const p1Level = document.getElementById('p1Level');
    const p1Length = document.getElementById('p1Length');
    const p1Combo = document.getElementById('p1Combo');
    const p1ComboFill = document.getElementById('p1ComboFill');
    const p1Buffs = document.getElementById('p1Buffs');
    const p1Revives = document.getElementById('p1Revives');
    // P2 DOM
    const p2Score = document.getElementById('p2Score');
    const p2Level = document.getElementById('p2Level');
    const p2Length = document.getElementById('p2Length');
    const p2Combo = document.getElementById('p2Combo');
    const p2ComboFill = document.getElementById('p2ComboFill');
    const p2Buffs = document.getElementById('p2Buffs');
    const p2Revives = document.getElementById('p2Revives');
    // Shared DOM
    const timerSpan = document.getElementById('timerDisplay');

    // ---------- Player state factory ----------
    function createPlayer(id, startX, startDir) {
        return {
            id,
            snake: [{x:startX,y:18},{x:startX-1,y:18},{x:startX-2,y:18}],
            direction: {...startDir},
            nextDirection: {...startDir},
            score: 0,
            level: 1,
            revives: 3,
            combo: 0,
            comboTimeoutId: null,
            comboBurstNext: 5,
            alive: true,
            // buffs
            doubleTimer:0, slowTimer:0, speedTimer:0, ghostTimer:0, shieldTimer:0, bombTimer:0,
            dashActive:false, dashEndTime:0,
            lastKeyTime:0, lastKeyDir:null,
            // revive data
            deathSnakeLength:0,
            deathDirection:{x:1,y:0},
        };
    }

    let p1 = createPlayer(1, 10, {x:1,y:0});
    let p2 = createPlayer(2, 26, {x:-1,y:0});

    let items = [];
    let obstacles = [];
    let particles = [];
    let floatingTexts = [];
    let levelUpFlash = 0;
    let screenShake = 0;
    let gameState = 'waiting'; // waiting, playing, paused, over
    let reviveState = null; // {player:id, countdown:sec, intervalId}
    let gameTimer = GAME_DURATION;
    let moveIntervalId = null;
    let stormActive = false, stormEndTime = 0, stormSpawnInterval = null, stormTimer = STORM_INTERVAL;
    let audioCtx = null;

    // ---------- Audio ----------
    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
    function playEatSound(){
        if(!audioCtx) initAudio();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'square'; osc.frequency.value = 600; gain.gain.value = 0.08;
        osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001, now+0.08);
        osc.stop(now+0.08);
        setTimeout(()=>{
            const osc2 = audioCtx.createOscillator(), gain2 = audioCtx.createGain();
            osc2.connect(gain2); gain2.connect(audioCtx.destination);
            osc2.frequency.value = 900; gain2.gain.value = 0.06;
            osc2.start(); gain2.gain.exponentialRampToValueAtTime(0.0001, now+0.12);
            osc2.stop(now+0.12);
        },40);
    }

    // ---------- Helpers ----------
    function getBaseInterval() { return Math.max(SPEED_MIN, SPEED_BASE - (p1.level-1)*5); }
    function getMoveIntervalFor(p) {
        let i = getBaseInterval();
        if(p.dashActive && Date.now() < p.dashEndTime) i *= DASH_FACTOR;
        if(p.bombTimer > 0) i *= 0.5;
        if(p.speedTimer > 0) i *= 0.6;
        if(p.slowTimer > 0) i *= 1.6;
        return Math.max(30, Math.min(250, i));
    }

    let p1Interval = getMoveIntervalFor(p1);
    let p2Interval = getMoveIntervalFor(p2);

    function refreshMoveInterval() {
        if(moveIntervalId) clearInterval(moveIntervalId);
        if(gameState === 'playing') {
            let tick = 50; // fixed tick, each move processes both players
            moveIntervalId = setInterval(gameTick, tick);
        }
    }

    // ---------- Effects ----------
    function addExplosion(px,py,color,count=20,opts={}){
        for(let i=0;i<count;i++){
            const angle=Math.random()*Math.PI*2, speed=1.5+Math.random()*5;
            particles.push({
                x:px, y:py, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
                life:0.6+Math.random()*0.4, decay:0.015+Math.random()*0.02,
                size:2+Math.random()*(opts.big?5:3),
                color: opts.colors?opts.colors[Math.floor(Math.random()*opts.colors.length)]:color,
                shape:opts.shapes?opts.shapes[Math.floor(Math.random()*opts.shapes.length)]:'circle',
                rot:Math.random()*Math.PI*2
            });
        }
    }
    function addFloatingText(x,y,text,color='#ffd93d'){
        floatingTexts.push({x,y,text,life:1,vy:-2,color});
    }

    // ---------- Items ----------
    function spawnSingleItem(){
        for(let t=0;t<80;t++){
            let x=Math.floor(Math.random()*GRID), y=Math.floor(Math.random()*GRID);
            let occ = [...p1.snake, ...p2.snake, ...items.map(i=>({x:i.x,y:i.y})), ...obstacles].some(o=>o.x===x && o.y===y);
            if(!occ){
                let rand=Math.random(), acc=0, chosen=ITEM_TYPES[0];
                for(let t of ITEM_TYPES){ acc+=t.chance; if(rand<acc){ chosen=t; break; } }
                items.push({x,y,typeObj:chosen,spawnTime:Date.now()});
                return true;
            }
        }
        return false;
    }
    function spawnFood(count){
        for(let i=0;i<count && items.length<MAX_ITEMS;i++) spawnSingleItem();
    }

    function generateObstacles(levelNum){
        if(levelNum<1) return;
        let count = Math.min(3, 1+Math.floor(levelNum/2));
        for(let i=0;i<count;i++){
            for(let t=0;t<60;t++){
                let x=Math.floor(Math.random()*GRID), y=Math.floor(Math.random()*GRID);
                let headOk=[...p1.snake,...p2.snake].every(s=>Math.abs(s.x-x)+Math.abs(s.y-y)>=4);
                let occ = [...p1.snake,...p2.snake,...items,...obstacles].some(o=>o.x===x && o.y===y);
                if(!occ && headOk) { obstacles.push({x,y}); break; }
            }
        }
    }

    // ---------- Per-player apply item ----------
    function applyItem(player, item){
        let multiplier = 1 + Math.floor(player.combo/3)*0.5;
        let bonus = player.doubleTimer>0?2:1;
        let gain = Math.floor(item.typeObj.points * multiplier * bonus);
        player.score += gain;
        if(player.comboTimeoutId) clearTimeout(player.comboTimeoutId);
        player.combo++;
        player.comboTimeoutId = setTimeout(()=>{ player.combo=0; updateUI(); }, COMBO_TIMEOUT);
        // combo burst
        if(player.combo >= player.comboBurstNext) {
            player.comboBurstNext += 5;
            let burstTotal = 0;
            items.filter(i=>i!==item).forEach(i=>{
                burstTotal += Math.floor(i.typeObj.points * multiplier * (player.doubleTimer>0?2:1));
                addExplosion(i.x*CELL+CELL/2,i.y*CELL+CELL/2,i.typeObj.color,12,{ring:false,colors:[i.typeObj.color,'#fff']});
            });
            player.score += burstTotal;
            addFloatingText(canvas.width/2-40,canvas.height/2-40,`💥 BURST! +${burstTotal}`,'#ffd93d');
            addExplosion(canvas.width/2,canvas.height/2,'#ffd93d',30,{big:true,colors:['#ffd93d','#fff','#ff8c00']});
            items = items.filter(i=>i===item);
            spawnFood(2);
        }
        const cx=item.x*CELL+CELL/2, cy=item.y*CELL+CELL/2;
        addExplosion(cx,cy,item.typeObj.color,20,{big:true,ring:true});
        addFloatingText(item.x*CELL,item.y*CELL,`+${gain}`,item.typeObj.color);
        playEatSound();
        if(item.typeObj.effect === 'double') player.doubleTimer = item.typeObj.duration;
        else if(item.typeObj.effect === 'slow') player.slowTimer = item.typeObj.duration;
        else if(item.typeObj.effect === 'speed') player.speedTimer = item.typeObj.duration;
        else if(item.typeObj.effect === 'ghost') player.ghostTimer = item.typeObj.duration;
        else if(item.typeObj.effect === 'shield') player.shieldTimer = item.typeObj.duration;
        else if(item.typeObj.effect === 'bomb') {
            player.bombTimer = item.typeObj.duration;
            let cleared = obstacles.length;
            if(cleared>0) { player.score += cleared*5; addFloatingText(cx,cy-10,`💥 CLEARED +${cleared*5}!`,'#ff8c00'); }
            obstacles = [];
            addExplosion(cx,cy,'#ff4400',40,{big:true,colors:['#ff4400','#ff8800','#ffcc00','#fff']});
        }
        items = items.filter(i=>i!==item);
        checkLevelUp(player);
        if(items.length<2) spawnFood(2);
        updateUI();
    }

    function checkLevelUp(player){
        let newLevel = Math.floor(player.score/LEVEL_SCORE)+1;
        if(newLevel > player.level){
            let diff = newLevel - player.level;
            for(let i=0;i<diff;i++){
                player.level++;
                addExplosion(player.snake[0].x*CELL+CELL/2, player.snake[0].y*CELL+CELL/2, '#aaffaa', 30, {big:true,colors:['#00ff88','#88ffbb','#aaffaa','#fff']});
                addFloatingText(player.snake[0].x*CELL, player.snake[0].y*CELL-10, `⬆ LEVEL ${player.level}!`, '#00ff88');
                generateObstacles(player.level);
                spawnFood(2);
            }
            updateUI();
        }
    }

    // ---------- Rock hit (shrink) ----------
    function hitRock(player, x, y){
        obstacles = obstacles.filter(o=>!(o.x===x && o.y===y));
        let shrink = Math.min(2, player.snake.length-3);
        if(shrink<=0 || player.snake.length<=3) { killPlayer(player); return; }
        for(let i=0;i<shrink;i++) player.snake.pop();
        screenShake=8;
        addExplosion(x*CELL+CELL/2,y*CELL+CELL/2,'#7a6a5a',20,{big:true,colors:['#7a6a5a','#b0a090','#fff']});
        addFloatingText(x*CELL,y*CELL-10,`💥 缩小-${shrink}!`,'#b0a090');
        playEatSound();
        updateUI();
    }

    // ---------- Kill / Revive ----------
    function killPlayer(player){
        if(player.revives>0 && gameState==='playing' && !reviveState) {
            player.revives--;
            player.deathSnakeLength = player.snake.length;
            player.deathDirection = {...player.direction};
            player.snake = [];
            player.alive = false;
            player.doubleTimer=player.slowTimer=player.speedTimer=player.ghostTimer=player.shieldTimer=player.bombTimer=0;
            reviveState = {player:player.id, countdown:REVIVE_DELAY/1000};
            // check if both dead
            if(!p1.alive && !p2.alive) { gameOver(); return; }
            updateUI();
            return;
        }
        // permanently dead
        player.snake = [];
        player.alive = false;
        addExplosion(canvas.width/2,canvas.height/2,'#ff4444',30,{colors:['#ff4444','#ff8888']});
        if(!p1.alive && !p2.alive) gameOver();
        updateUI();
    }

    function doRevive(player){
        reviveState = null;
        player.snake = [{x:Math.floor(GRID/2), y:Math.floor(GRID/2)}];
        for(let i=1; i<player.deathSnakeLength; i++) player.snake.push({x:Math.floor(GRID/2)-i, y:Math.floor(GRID/2)});
        player.direction = player.deathDirection || {x:1,y:0};
        player.nextDirection = {...player.direction};
        player.ghostTimer = 3000;
        player.alive = true;
        obstacles = [];
        addFloatingText(canvas.width/2,canvas.height/2,'复活成功！');
        updateUI();
    }

    // ---------- Game tick ----------
    let p1Accum = 0, p2Accum = 0;

    function gameTick(){
        if(gameState !== 'playing') return;

        // Timer
        gameTimer -= 50;
        if(gameTimer <= 0) { gameTimer = 0; gameOver(); return; }

        // Revive timer
        if(reviveState) {
            reviveState.countdown -= 0.05;
            if(reviveState.countdown <= 0) {
                doRevive(reviveState.player === 1 ? p1 : p2);
            }
        }

        // Process movement with accumulation
        p1Interval = getMoveIntervalFor(p1);
        p2Interval = getMoveIntervalFor(p2);
        p1Accum += 50;
        p2Accum += 50;

        let movedP1 = false, movedP2 = false;
        if(p1Accum >= p1Interval && p1.alive) { p1Accum = 0; moveSnake(p1); movedP1 = true; }
        if(p2Accum >= p2Interval && p2.alive) { p2Accum = 0; moveSnake(p2); movedP2 = true; }

        // Update buffs
        [p1,p2].forEach(p => {
            if(p.doubleTimer>0) p.doubleTimer = Math.max(0, p.doubleTimer-50);
            if(p.slowTimer>0) p.slowTimer = Math.max(0, p.slowTimer-50);
            if(p.speedTimer>0) p.speedTimer = Math.max(0, p.speedTimer-50);
            if(p.ghostTimer>0) p.ghostTimer = Math.max(0, p.ghostTimer-50);
            if(p.shieldTimer>0) p.shieldTimer = Math.max(0, p.shieldTimer-50);
            if(p.bombTimer>0) p.bombTimer = Math.max(0, p.bombTimer-50);
        });

        // Storm
        if(!stormActive && stormTimer<=0) { startStorm(); stormTimer=STORM_INTERVAL; }
        else stormTimer -= 50;

        updateUI();
    }

    function moveSnake(player){
        const other = player===p1 ? p2 : p1;
        player.direction = {...player.nextDirection};
        let head = {x:player.snake[0].x+player.direction.x, y:player.snake[0].y+player.direction.y};
        if(head.x<0) head.x=GRID-1; if(head.x>=GRID) head.x=0;
        if(head.y<0) head.y=GRID-1; if(head.y>=GRID) head.y=0;

        // Check item
        let ateItem = items.find(i=>i.x===head.x && i.y===head.y);
        if(ateItem) {
            applyItem(player, ateItem);
            player.snake.unshift(head);
        } else {
            player.snake.unshift(head);
            player.snake.pop();
        }

        // Check collisions
        // Rock
        let hitObs = obstacles.some(o=>o.x===player.snake[0].x && o.y===player.snake[0].y);
        if(hitObs) {
            if(player.ghostTimer>0) { /* pass */ }
            else if(player.shieldTimer>0) {
                player.shieldTimer=0;
                obstacles = obstacles.filter(o=>!(o.x===player.snake[0].x && o.y===player.snake[0].y));
                player.score += 3;
                addFloatingText(player.snake[0].x*CELL, player.snake[0].y*CELL-10,'🛡️ SMASH +3!','#c084fc');
                updateUI();
            }
            else { hitRock(player, player.snake[0].x, player.snake[0].y); return; }
        }

        // Self-collide
        let selfHit = player.snake.slice(1).some(s=>s.x===player.snake[0].x && s.y===player.snake[0].y);
        if(selfHit) {
            if(player.ghostTimer>0) { /* pass */ }
            else { killPlayer(player); return; }
        }

        // Other snake body
        let otherHit = other.snake.some(s=>s.x===player.snake[0].x && s.y===player.snake[0].y);
        if(otherHit) {
            if(player.ghostTimer>0) { /* pass */ }
            else { killPlayer(player); return; }
        }
    }

    // ---------- Storm ----------
    function startStorm(){
        if(stormActive) return;
        stormActive=true;
        stormEndTime = Date.now()+STORM_DURATION;
        addExplosion(canvas.width/2,canvas.height/2,'#00ff88',30,{big:true,colors:['#00ff88','#00ccff','#fff']});
        let spawned=0;
        stormSpawnInterval = setInterval(()=>{
            if(!stormActive || gameState==='paused') return;
            if(spawned>=STORM_TOTAL_ITEMS || Date.now()>=stormEndTime){
                clearInterval(stormSpawnInterval);
                stormActive=false;
                stormTimer = STORM_INTERVAL;
                return;
            }
            spawnSingleItem();
            spawned++;
        }, STORM_SPAWN_INTERVAL);
    }

    // ---------- Game over ----------
    function gameOver(){
        gameState = 'over';
        if(moveIntervalId) clearInterval(moveIntervalId);
        if(stormSpawnInterval) clearInterval(stormSpawnInterval);
        addExplosion(canvas.width/2,canvas.height/2,'#ff6666',40,{big:true,colors:['#ff4444','#ff8888','#ffcccc','#fff']});
        updateUI();
    }

    function checkWinner(){
        if(p1.score > p2.score) return 1;
        if(p2.score > p1.score) return 2;
        return 0; // draw
    }

    // ---------- Reset ----------
    function resetGame(){
        if(moveIntervalId) clearInterval(moveIntervalId);
        if(stormSpawnInterval) clearInterval(stormSpawnInterval);
        if(reviveState?.intervalId) clearInterval(reviveState.intervalId);
        stormActive=false; reviveState=null;
        gameState = 'waiting';
        gameTimer = GAME_DURATION;
        p1 = createPlayer(1, 10, {x:1,y:0});
        p2 = createPlayer(2, 26, {x:-1,y:0});
        obstacles=[]; items=[]; particles=[]; floatingTexts=[]; screenShake=0; levelUpFlash=0;
        stormTimer = STORM_INTERVAL;
        p1Accum=0; p2Accum=0;
        spawnFood(5);
        generateObstacles(1);
        updateUI();
    }

    // ---------- Draw ----------
    function draw(){
        const t = Date.now();
        ctx.clearRect(0,0,720,720);
        ctx.fillStyle='#fff8ee'; ctx.fillRect(0,0,720,720);

        // Storm overlay
        if(stormActive) {
            ctx.fillStyle=`rgba(255,200,80,${0.06+0.04*Math.sin(t*0.02)})`;
            ctx.fillRect(0,0,720,720);
            for(let i=0;i<8;i++){
                ctx.fillStyle=`rgba(255,200,100,${0.1+0.1*Math.random()})`;
                ctx.fillRect(Math.random()*720,Math.random()*720,2,12+Math.random()*20);
            }
        }

        // Grid
        ctx.beginPath(); ctx.strokeStyle='rgba(200,170,130,0.35)'; ctx.lineWidth=0.5;
        for(let i=0;i<=GRID;i++){ ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,720); ctx.moveTo(0,i*CELL); ctx.lineTo(720,i*CELL); }
        ctx.stroke();

        // Rocks
        obstacles.forEach(o=>{
            const cx=o.x*CELL+CELL/2, cy=o.y*CELL+CELL/2, r=CELL/2-2;
            const seed = o.x*7.3+o.y*3.1;
            ctx.save();
            ctx.shadowBlur=10; ctx.shadowColor='rgba(80,60,40,0.4)';
            const grad = ctx.createRadialGradient(cx-r*0.3,cy-r*0.3,1,cx,cy,r+2);
            grad.addColorStop(0,'#d0c0b0'); grad.addColorStop(0.5,'#948474'); grad.addColorStop(1,'#5a4a3a');
            ctx.fillStyle=grad;
            ctx.beginPath();
            for(let i=0;i<6;i++){
                const a=i/6*Math.PI*2-Math.PI/2, vr=0.75+0.25*Math.sin(i*2.7+seed);
                const px=cx+Math.cos(a)*r*vr, py=cy+Math.sin(a)*r*vr;
                i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
            }
            ctx.closePath(); ctx.fill();
            ctx.shadowBlur=0;
            ctx.fillStyle='rgba(230,220,210,0.2)';
            ctx.beginPath(); ctx.ellipse(cx-r*0.25,cy-r*0.3,r*0.35,r*0.18,-0.4,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle='rgba(50,35,25,0.25)'; ctx.lineWidth=1;
            ctx.beginPath(); ctx.moveTo(cx-r*0.2,cy+r*0.05); ctx.lineTo(cx+r*0.05,cy+r*0.25); ctx.lineTo(cx+r*0.3,cy-r*0.05); ctx.stroke();
            ctx.restore();
        });

        // Items
        items.forEach(i=>{
            const cx=i.x*CELL+CELL/2, cy=i.y*CELL+CELL/2, pulse=1+0.2*Math.sin(t*0.005+i.x+i.y);
            ctx.save(); ctx.translate(cx,cy);
            const glow = ctx.createRadialGradient(0,0,2,0,0,CELL*0.9*pulse);
            glow.addColorStop(0,i.typeObj.color); glow.addColorStop(0.4,i.typeObj.color+'66'); glow.addColorStop(1,'transparent');
            ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,CELL*0.9*pulse,0,Math.PI*2); ctx.fill();
            ctx.rotate(t*0.003); const s=CELL*0.3*pulse;
            ctx.shadowBlur=12; ctx.shadowColor=i.typeObj.color; ctx.fillStyle=i.typeObj.color;
            if(i.typeObj.type==='FOOD'){ ctx.beginPath(); ctx.arc(0,0,s,0,Math.PI*2); ctx.fill(); }
            else if(i.typeObj.type==='DOUBLES'){ for(let j=0;j<5;j++){ let a=-Math.PI/2+j*2*Math.PI/5; ctx.beginPath(); ctx.moveTo(Math.cos(a)*s,Math.sin(a)*s); a+=2*Math.PI/5; ctx.lineTo(Math.cos(a)*s*0.4,Math.sin(a)*s*0.4); ctx.closePath(); ctx.fill(); } }
            else if(i.typeObj.type==='SLOW'){ ctx.save(); ctx.rotate(Math.PI/4); ctx.fillRect(-s*0.5,-s*0.5,s,s); ctx.restore(); }
            else if(i.typeObj.type==='FAST'){ ctx.beginPath(); ctx.moveTo(-s,-s); ctx.lineTo(s,0); ctx.lineTo(-s,s); ctx.closePath(); ctx.fill(); }
            else if(i.typeObj.type==='GHOST'){ ctx.beginPath(); for(let j=0;j<6;j++){ let a=j*Math.PI/3-Math.PI/6; ctx.lineTo(Math.cos(a)*s,Math.sin(a)*s); } ctx.closePath(); ctx.fill(); }
            else if(i.typeObj.type==='SHIELD'){ ctx.beginPath(); ctx.arc(0,0,s,0.8,Math.PI-0.8); ctx.lineTo(0,s*1.4); ctx.closePath(); ctx.fill(); }
            else if(i.typeObj.type==='BOMB'){ ctx.shadowBlur=20; ctx.shadowColor='#ff4400'; ctx.font='bold 26px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('💣',0,2); ctx.shadowBlur=0; }
            ctx.restore();
        });

        // Snakes
        function drawSnake(player, color1, color2, isP1){
            if(!player.alive && player.snake.length===0) return;
            const hueShift = isP1 ? 0 : 200;
            player.snake.forEach((seg,idx)=>{
                const x=seg.x*CELL, y=seg.y*CELL, isHead=idx===0;
                ctx.save();
                if(isHead){
                    const hg = ctx.createRadialGradient(x+CELL/2,y+CELL/2,2,x+CELL/2,y+CELL/2,CELL*1.2);
                    hg.addColorStop(0,`rgba(${isP1?'0,220,100':'50,140,255'},0.3)`);
                    hg.addColorStop(1,'transparent');
                    ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(x+CELL/2,y+CELL/2,CELL*1.2,0,Math.PI*2); ctx.fill();
                }
                let fillStyle;
                if(isHead) {
                    const g=ctx.createLinearGradient(x,y,x+CELL,y+CELL);
                    g.addColorStop(0,color1); g.addColorStop(0.5,isP1?'#44dd77':'#55aaff'); g.addColorStop(1,color2);
                    fillStyle=g;
                } else {
                    const hue = (t*0.08+idx*18+hueShift)%360;
                    fillStyle=`hsl(${hue},85%,60%)`;
                }
                ctx.shadowBlur=isHead?10:6;
                ctx.shadowColor=isHead?(isP1?'rgba(50,180,80,0.5)':'rgba(50,140,255,0.5)'):`hsla(${(t*0.08+idx*18+hueShift)%360},85%,60%,0.6)`;
                ctx.fillStyle=fillStyle;
                const pad=1;
                ctx.beginPath();
                if(isHead){
                    const r=4; ctx.moveTo(x+CELL-pad,y+pad+r); ctx.quadraticCurveTo(x+CELL-pad,y+pad,x+CELL-pad-r,y+pad);
                    ctx.lineTo(x+pad+r,y+pad); ctx.quadraticCurveTo(x+pad,y+pad,x+pad,y+pad+r);
                    ctx.lineTo(x+pad,y+CELL-pad-r); ctx.quadraticCurveTo(x+pad,y+CELL-pad,x+pad+r,y+CELL-pad);
                    ctx.lineTo(x+CELL-pad-r,y+CELL-pad); ctx.quadraticCurveTo(x+CELL-pad,y+CELL-pad,x+CELL-pad,y+CELL-pad-r);
                    ctx.closePath(); ctx.fill();
                } else {
                    const r=3; ctx.moveTo(x+CELL-pad,y+pad+r); ctx.quadraticCurveTo(x+CELL-pad,y+pad,x+CELL-pad-r,y+pad);
                    ctx.lineTo(x+pad+r,y+pad); ctx.quadraticCurveTo(x+pad,y+pad,x+pad,y+pad+r);
                    ctx.lineTo(x+pad,y+CELL-pad-r); ctx.quadraticCurveTo(x+pad,y+CELL-pad,x+pad+r,y+CELL-pad);
                    ctx.lineTo(x+CELL-pad-r,y+CELL-pad); ctx.quadraticCurveTo(x+CELL-pad,y+CELL-pad,x+CELL-pad,y+CELL-pad-r);
                    ctx.closePath(); ctx.fill();
                }
                // Eyes
                if(isHead){
                    ctx.shadowBlur=0;
                    const d=player.direction;
                    let ex1,ey1,ex2,ey2;
                    if(d.x===1){ ex1=CELL*0.7;ey1=CELL*0.25;ex2=CELL*0.7;ey2=CELL*0.65; }
                    else if(d.x===-1){ ex1=CELL*0.3;ey1=CELL*0.25;ex2=CELL*0.3;ey2=CELL*0.65; }
                    else if(d.y===-1){ ex1=CELL*0.25;ey1=CELL*0.3;ex2=CELL*0.65;ey2=CELL*0.3; }
                    else { ex1=CELL*0.25;ey1=CELL*0.7;ex2=CELL*0.65;ey2=CELL*0.7; }
                    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+ex1,y+ey1,3,0,Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(x+ex2,y+ey2,3,0,Math.PI*2); ctx.fill();
                    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(x+ex1,y+ey1,1.5,0,Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(x+ex2,y+ey2,1.5,0,Math.PI*2); ctx.fill();
                }
                ctx.restore();
            });
        }
        drawSnake(p1, '#66ee88', '#33aa55', true);
        drawSnake(p2, '#66aaff', '#3377dd', false);

        // Floating texts
        floatingTexts = floatingTexts.filter(ft=>{
            ctx.save();
            ctx.font='bold 20px "Segoe UI"'; ctx.shadowBlur=6; ctx.shadowColor=ft.color;
            ctx.fillStyle=ft.color; ctx.globalAlpha=ft.life;
            ctx.textAlign='center'; ctx.fillText(ft.text,ft.x+CELL/2,ft.y);
            ft.life-=0.025; ft.y+=ft.vy;
            ctx.restore();
            return ft.life>0;
        });

        // Particles
        particles = particles.filter(p=>{
            ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
            ctx.shadowBlur=8; ctx.shadowColor=p.color;
            if(p.shape==='circle'){ ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); }
            else if(p.shape==='star'){
                ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot||0);
                for(let j=0;j<5;j++){ let a=-Math.PI/2+j*2*Math.PI/5; ctx.beginPath(); ctx.moveTo(Math.cos(a)*p.size,Math.sin(a)*p.size); a+=2*Math.PI/5; ctx.lineTo(Math.cos(a)*p.size*0.4,Math.sin(a)*p.size*0.4); ctx.closePath(); ctx.fill(); }
                ctx.restore();
            } else ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
            p.life-=p.decay; p.x+=p.vx; p.y+=p.vy; if(p.shape==='star') p.rot=(p.rot||0)+0.1;
            return p.life>0;
        });
        ctx.globalAlpha=1; ctx.shadowBlur=0;

        // Level-up flash
        if(levelUpFlash>0){ ctx.fillStyle=`rgba(255,220,100,${levelUpFlash/240*0.25})`; ctx.fillRect(0,0,720,720); levelUpFlash--; }

        // Screen shake
        const didShake = screenShake>0;
        if(didShake){ ctx.save(); ctx.translate((Math.random()-0.5)*screenShake*0.5,(Math.random()-0.5)*screenShake); screenShake*=0.9; if(screenShake<0.3) screenShake=0; }

        // Overlays
        if(gameState==='waiting'){
            ctx.fillStyle='rgba(255,248,235,0.88)'; ctx.fillRect(0,0,720,720);
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.shadowBlur=10; ctx.shadowColor='rgba(255,140,0,0.4)';
            ctx.fillStyle='#ff8c00'; ctx.font='bold 38px "Segoe UI"';
            ctx.fillText('🐍 双人贪吃蛇',360,170);
            ctx.shadowBlur=4; ctx.shadowColor='rgba(255,200,150,0.3)';
            ctx.fillStyle='#5a4a2a'; ctx.font='bold 22px monospace';
            ctx.fillText('按 空格 开始',360,260);
            ctx.font='18px monospace'; ctx.fillStyle='#8B7355';
            ctx.fillText('🟢 P1: WASD    🔵 P2: 方向键',360,340);
            ctx.fillText('吃食物得分 | 双击方向冲刺',360,380);
            ctx.fillText('⏱️ 限时 1:30 | 最高分获胜!',360,420);
        }
        if(gameState==='paused'){
            ctx.fillStyle='rgba(255,248,235,0.82)'; ctx.fillRect(0,0,720,720);
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.shadowBlur=8; ctx.shadowColor='rgba(255,140,0,0.3)';
            ctx.fillStyle='#ff8c00'; ctx.font='bold 40px monospace';
            ctx.fillText('⏸ 暂停',360,340);
            ctx.shadowBlur=0; ctx.fillStyle='#8B7355'; ctx.font='18px monospace';
            ctx.fillText('按 空格 继续',360,420);
        }
        if(reviveState){
            ctx.fillStyle='rgba(255,200,150,0.8)'; ctx.fillRect(0,0,720,720);
            ctx.textAlign='center'; ctx.textBaseline='middle';
            const who = reviveState.player===1 ? '🟢 P1' : '🔵 P2';
            ctx.fillStyle='#ff8c00'; ctx.font='bold 32px monospace';
            ctx.shadowBlur=8; ctx.shadowColor='rgba(255,140,0,0.4)';
            ctx.fillText(`${who} 复活中...`,360,330);
            ctx.font='bold 48px monospace'; ctx.fillStyle='#5a4a2a'; ctx.shadowColor='rgba(255,200,150,0.5)'; ctx.shadowBlur=4;
            ctx.fillText(`${Math.max(0,Math.ceil(reviveState.countdown))}`,360,390);
        }
        if(gameState==='over'){
            ctx.fillStyle='rgba(255,240,220,0.92)'; ctx.fillRect(0,0,720,720);
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.shadowBlur=12; ctx.shadowColor='rgba(200,100,50,0.3)';
            const isTimeout = gameTimer<=0;
            ctx.fillStyle=isTimeout?'#4d96ff':'#c07050'; ctx.font='bold 46px monospace';
            ctx.fillText(isTimeout?'⏱️ 时间到!':'GAME OVER',360,250);

            let winText='', winColor='#5a4a2a';
            const w = checkWinner();
            if(w===1) { winText='🟢 P1 获胜!'; winColor='#33aa55'; }
            else if(w===2) { winText='🔵 P2 获胜!'; winColor='#3388dd'; }
            else winText='🤝 平局!';
            ctx.fillStyle=winColor; ctx.font='bold 34px "Segoe UI"'; ctx.shadowBlur=8;
            ctx.fillText(winText,360,330);

            ctx.shadowBlur=4; ctx.font='bold 22px monospace';
            ctx.fillStyle='#33aa55'; ctx.fillText(`🟢 P1: ${p1.score}分 · ${p1.level}级`,360,400);
            ctx.fillStyle='#3388dd'; ctx.fillText(`🔵 P2: ${p2.score}分 · ${p2.level}级`,360,435);
            ctx.fillStyle='#a08060'; ctx.font='18px monospace';
            ctx.fillText('按 空格 重新开始',360,490);
        }

        if(didShake) ctx.restore();
        ctx.shadowBlur=0; ctx.textAlign='start'; ctx.textBaseline='alphabetic';
    }

    function animate(){ requestAnimationFrame(animate); draw(); }
    animate();

    // ---------- Controls ----------
    document.addEventListener('keydown',(e)=>{
        let k=e.key; e.preventDefault();
        if(k===' '||k==='Space'){
            if(gameState==='waiting'){ resetGame(); gameState='playing'; refreshMoveInterval(); }
            else if(gameState==='playing'){ gameState='paused'; if(moveIntervalId) clearInterval(moveIntervalId); }
            else if(gameState==='paused'){ gameState='playing'; refreshMoveInterval(); }
            else if(gameState==='over'){ resetGame(); }
            return;
        }
        // P1: WASD
        if(k==='w'||k==='W') handleDir(p1,{x:0,y:-1});
        else if(k==='s'||k==='S') handleDir(p1,{x:0,y:1});
        else if(k==='a'||k==='A') handleDir(p1,{x:-1,y:0});
        else if(k==='d'||k==='D') handleDir(p1,{x:1,y:0});
        // P2: Arrows
        else if(k==='ArrowUp') handleDir(p2,{x:0,y:-1});
        else if(k==='ArrowDown') handleDir(p2,{x:0,y:1});
        else if(k==='ArrowLeft') handleDir(p2,{x:-1,y:0});
        else if(k==='ArrowRight') handleDir(p2,{x:1,y:0});
    });

    function handleDir(player, dir){
        if(gameState !== 'playing' || !player.alive) return;
        if(player.direction.x===-dir.x && player.direction.y===-dir.y) return;
        let now=Date.now();
        if(player.lastKeyDir && player.lastKeyDir.x===dir.x && player.lastKeyDir.y===dir.y) { /* hold */ }
        else if(player.lastKeyTime && (now-player.lastKeyTime)<DASH_WINDOW && player.lastKeyDir && (player.lastKeyDir.x!==dir.x || player.lastKeyDir.y!==dir.y)){
            // Dash
            player.dashActive=true; player.dashEndTime=now+DASH_DURATION;
            if(player.snake.length>0){
                for(let i=0;i<8;i++) particles.push({
                    x:player.snake[0].x*CELL+CELL/2+(Math.random()-0.5)*CELL*2,
                    y:player.snake[0].y*CELL+CELL/2+(Math.random()-0.5)*CELL*2,
                    vx:-dir.x*(2+Math.random()*3), vy:-dir.y*(2+Math.random()*3),
                    life:0.4, decay:0.025, size:2+Math.random()*3, color:player.id===1?'#00ccff':'#4488ff', shape:'circle'
                });
            }
            setTimeout(()=>{ player.dashActive=false; }, DASH_DURATION);
        }
        player.nextDirection = dir;
        player.lastKeyDir = dir;
        player.lastKeyTime = now;
    }

    // ---------- UI Update ----------
    function updateUI(){
        // P1
        p1Score.innerText = p1.score;
        p1Level.innerText = p1.level;
        p1Length.innerText = p1.snake.length;
        let mult1 = 1+Math.floor(p1.combo/3)*0.5;
        p1Combo.innerText = `x${mult1.toFixed(1)}`;
        p1ComboFill.style.width = p1.combo>0 ? Math.min(100,p1.combo*15)+'%' : '0%';
        let b1=[];
        if(p1.doubleTimer>0) b1.push(`⭐${Math.ceil(p1.doubleTimer/1000)}s`);
        if(p1.slowTimer>0) b1.push(`🐢${Math.ceil(p1.slowTimer/1000)}s`);
        if(p1.speedTimer>0) b1.push(`⚡${Math.ceil(p1.speedTimer/1000)}s`);
        if(p1.ghostTimer>0) b1.push(`👻${Math.ceil(p1.ghostTimer/1000)}s`);
        if(p1.shieldTimer>0) b1.push(`🛡️${Math.ceil(p1.shieldTimer/1000)}s`);
        if(p1.bombTimer>0) b1.push(`💣${Math.ceil(p1.bombTimer/1000)}s`);
        p1Buffs.innerHTML = b1.length ? b1.map(b=>`<span class="buff-tag">${b}</span>`).join('') : '无';
        p1Revives.innerHTML = Array.from({length:3},(_,i)=>`<span class="revive-dot p1c ${i>=p1.revives?'used':''}"></span>`).join('');

        // P2
        p2Score.innerText = p2.score;
        p2Level.innerText = p2.level;
        p2Length.innerText = p2.snake.length;
        let mult2 = 1+Math.floor(p2.combo/3)*0.5;
        p2Combo.innerText = `x${mult2.toFixed(1)}`;
        p2ComboFill.style.width = p2.combo>0 ? Math.min(100,p2.combo*15)+'%' : '0%';
        let b2=[];
        if(p2.doubleTimer>0) b2.push(`⭐${Math.ceil(p2.doubleTimer/1000)}s`);
        if(p2.slowTimer>0) b2.push(`🐢${Math.ceil(p2.slowTimer/1000)}s`);
        if(p2.speedTimer>0) b2.push(`⚡${Math.ceil(p2.speedTimer/1000)}s`);
        if(p2.ghostTimer>0) b2.push(`👻${Math.ceil(p2.ghostTimer/1000)}s`);
        if(p2.shieldTimer>0) b2.push(`🛡️${Math.ceil(p2.shieldTimer/1000)}s`);
        if(p2.bombTimer>0) b2.push(`💣${Math.ceil(p2.bombTimer/1000)}s`);
        p2Buffs.innerHTML = b2.length ? b2.map(b=>`<span class="buff-tag">${b}</span>`).join('') : '无';
        p2Revives.innerHTML = Array.from({length:3},(_,i)=>`<span class="revive-dot p2c ${i>=p2.revives?'used':''}"></span>`).join('');

        // Timer
        let totalSec = Math.max(0, Math.ceil(gameTimer/1000));
        let min = Math.floor(totalSec/60), sec = totalSec%60;
        timerSpan.innerText = `${min}:${sec.toString().padStart(2,'0')}`;
        timerSpan.style.color = gameTimer<30000?'#ff4444':'';
    }

    // ---------- Init ----------
    resetGame();
})();
</script>
</body>
</html>
